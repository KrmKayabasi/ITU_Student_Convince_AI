# Single-entry gateway for the İTÜ Convince AI kiosk.
#
# The browser (with NEXT_PUBLIC_IN_DOCKER=true) addresses backends under path
# prefixes on the same origin; this gateway strips the prefix and proxies with
# WebSocket upgrade support:
#
#   /            -> frontend:3000        (Next.js kiosk UI)
#   /api/...     -> cv-pipeline:8000/... (CV /stream, /profile, /focus, /health)
#   /orch/...    -> orchestrator:8001/... (Gemini Live WS /v1/realtime, /v1/health)
#
# Kiosk URL: http://<host>:8080/kiosk

events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;

    location /api/ {
      proxy_pass http://cv-pipeline:8000/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location /orch/ {
      proxy_pass http://orchestrator:8001/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location / {
      proxy_pass http://frontend:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
    }
  }
}
