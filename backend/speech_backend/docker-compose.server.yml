services:
  speech-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8002:8002"
    environment:
      - SPEECH_PROVIDER=openai_realtime
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_REALTIME_MODEL=${OPENAI_REALTIME_MODEL:-gpt-realtime-2.1}
      - OPENAI_REALTIME_VOICE=${OPENAI_REALTIME_VOICE:-marin}
      - OPENAI_REALTIME_TRANSCRIPTION_MODEL=${OPENAI_REALTIME_TRANSCRIPTION_MODEL:-gpt-realtime-whisper}
      - OPENAI_REALTIME_LANGUAGE=${OPENAI_REALTIME_LANGUAGE:-tr}
      - SPEECH_SERVER_TOKEN=${SPEECH_SERVER_TOKEN:-}
      - SPEECH_SERVER_HOST=0.0.0.0
      - SPEECH_SERVER_PORT=8002
    restart: unless-stopped
