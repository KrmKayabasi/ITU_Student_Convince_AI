# Birlesik stack: goruntu isleme (cv-pipeline) + AIme_Girl (Unmute sesli AI) uctan uca dockerize edilmis.
#
# Tek komutla ayaga kaldirir:
#   docker compose up --build
#
name: bbf-suite

services:
  # ── Goruntu isleme (FastAPI) ──────────────────────────────────────────────
  cv-pipeline:
    image: cv-pipeline:latest
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ── AIme_Girl (Unmute) backend ────────────────────────────────────────────
  aime-backend:
    image: unmute-backend:latest
    build:
      context: ./backend/voice_agent
      dockerfile: Dockerfile
      target: hot-reloading
    volumes:
      - ./backend/voice_agent/unmute:/app/unmute
    environment:
      - KYUTAI_STT_URL=ws://stt:8080
      - KYUTAI_TTS_URL=ws://tts:8080
      - KYUTAI_LLM_URL=http://llm:8000
      - KYUTAI_LLM_MODEL=${KYUTAI_LLM_MODEL:-google/gemma-4-E2B-it}
      - UNMUTE_DEFAULT_LANGUAGE=${UNMUTE_DEFAULT_LANGUAGE:-tr}
    ports:
      - "8001:80"
    depends_on:
      - stt
      - tts
      - llm
    restart: unless-stopped

  # ── AIme_Girl (Unmute) frontend ───────────────────────────────────────────
  aime-frontend:
    image: unmute-frontend:latest
    build:
      context: ./frontend
      dockerfile: hot-reloading.Dockerfile
    volumes:
      - ./frontend/src:/app/src
    environment:
      - NEXT_PUBLIC_IN_DOCKER=false
      - NEXT_PUBLIC_BACKEND_PORT=8001
    ports:
      - "3000:3000"
    depends_on:
      - aime-backend
    restart: unless-stopped

  # ── Moshi Speech-to-Text (STT) ─────────────────────────────────────────────
  stt:
    image: moshi-server:latest
    build:
      context: ./backend/voice_agent/services/moshi-server
      dockerfile: public.Dockerfile
    command: ["worker", "--config", "configs/stt.toml"]
    environment:
      - HUGGING_FACE_HUB_TOKEN=$HUGGING_FACE_HUB_TOKEN
    volumes:
      - ./volumes/hf-cache:/root/.cache/huggingface
      - ./volumes/cargo-registry-stt:/root/.cargo/registry
      - ./volumes/stt-target:/app/target
      - ./volumes/uv-cache:/root/.cache/uv
      - ./volumes/stt-logs:/tmp/unmute_logs
    ports:
      - "8090:8080"
    restart: unless-stopped

  # ── Moshi Text-to-Speech (TTS) ─────────────────────────────────────────────
  tts:
    image: moshi-server:latest
    build:
      context: ./backend/voice_agent/services/moshi-server
      dockerfile: public.Dockerfile
    command: ["worker", "--config", "configs/tts.toml"]
    environment:
      - HUGGING_FACE_HUB_TOKEN=$HUGGING_FACE_HUB_TOKEN
    volumes:
      - ./volumes/hf-cache:/root/.cache/huggingface
      - ./volumes/cargo-registry-tts:/root/.cargo/registry
      - ./volumes/tts-target:/app/target
      - ./volumes/uv-cache:/root/.cache/uv
      - ./volumes/tts-logs:/tmp/unmute_logs
    ports:
      - "8089:8080"
    restart: unless-stopped

  # ── vLLM Gemma 4 OpenAI server ────────────────────────────────────────────
  llm:
    image: vllm/vllm-openai:v0.11.0
    command:
      [
        "--model=google/gemma-4-E2B-it",
        "--max-model-len=1536",
        "--dtype=bfloat16",
        "--gpu-memory-utilization=0.4"
      ]
    environment:
      - HUGGING_FACE_HUB_TOKEN=$HUGGING_FACE_HUB_TOKEN
    volumes:
      - ./volumes/hf-cache:/root/.cache/huggingface
      - ./volumes/vllm-cache:/root/.cache/vllm
    ports:
      - "8091:8000"
    restart: unless-stopped
